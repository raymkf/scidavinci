name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea clearly.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? What are you trying to accomplish?
      placeholder: I'm always frustrated when ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered?

  - type: dropdown
    id: component
    attributes:
      label: Related Component
      description: Which part of SciDaVinci does this relate to?
      options:
        - Interactive chart generation
        - Chart element selection
        - Model-driven visual editing
        - Figure analysis
        - Collage / multi-panel export
        - Web UI
        - Agent runtime
        - Documentation / examples
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, examples from other projects, screenshots, etc.
